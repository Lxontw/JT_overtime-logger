
<!DOCTYPE html>
<html lang="zh-TW" data-theme="poryphone">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無盡火域：神魄登記</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --base-font-size: 18px;
            --global-radius: 22px;
            --warning-red: #ef4444;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="poryphone"] {
            --bg: radial-gradient(circle at top, rgba(34, 211, 238, 0.28), transparent 30%), linear-gradient(145deg, #031a1e 0%, #0a5660 45%, #042c31 100%);
            --surface: rgba(5, 28, 33, 0.72);
            --surface-strong: rgba(10, 44, 49, 0.9);
            --surface-soft: rgba(255, 255, 255, 0.08);
            --text: #f2fdff;
            --text-muted: rgba(242, 253, 255, 0.66);
            --input-bg: rgba(255, 255, 255, 0.08);
            --input-border: rgba(133, 239, 255, 0.28);
            --accent: #5ce1e6;
            --accent-strong: #00f2ff;
            --btn-primary: linear-gradient(135deg, #42e8ee, #0ea5b7);
            --btn-shadow: rgba(6, 95, 107, 0.48);
            --mode-active-bg: linear-gradient(135deg, rgba(92, 225, 230, 0.95), rgba(0, 242, 255, 0.82));
            --mode-active-text: #032a2f;
            --placeholder-color: rgba(242, 253, 255, 0.58);
            --panel-border: rgba(123, 238, 255, 0.18);
            --ring: 0 0 0 1px rgba(126, 239, 255, 0.22), 0 30px 60px rgba(0, 0, 0, 0.28);
        }

        [data-theme="light"] {
            --bg: radial-gradient(circle at top, rgba(79, 70, 229, 0.12), transparent 26%), linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
            --surface: rgba(255, 255, 255, 0.86);
            --surface-strong: rgba(255, 255, 255, 0.96);
            --surface-soft: rgba(99, 102, 241, 0.05);
            --text: #172033;
            --text-muted: #64748b;
            --input-bg: #ffffff;
            --input-border: rgba(99, 102, 241, 0.16);
            --accent: #4f46e5;
            --accent-strong: #312e81;
            --btn-primary: linear-gradient(135deg, #4f46e5, #312e81);
            --btn-shadow: rgba(79, 70, 229, 0.28);
            --mode-active-bg: linear-gradient(135deg, #4f46e5, #312e81);
            --mode-active-text: #ffffff;
            --placeholder-color: #94a3b8;
            --panel-border: rgba(148, 163, 184, 0.26);
            --ring: 0 0 0 1px rgba(148, 163, 184, 0.2), 0 30px 60px rgba(15, 23, 42, 0.1);
        }

        [data-theme="dark"] {
            --bg: radial-gradient(circle at top, rgba(245, 158, 11, 0.12), transparent 25%), linear-gradient(180deg, #04070d 0%, #0f172a 100%);
            --surface: rgba(10, 14, 24, 0.82);
            --surface-strong: rgba(15, 23, 42, 0.92);
            --surface-soft: rgba(255, 255, 255, 0.04);
            --text: #f8fafc;
            --text-muted: rgba(248, 250, 252, 0.64);
            --input-bg: rgba(15, 23, 42, 0.9);
            --input-border: rgba(245, 158, 11, 0.14);
            --accent: #f59e0b;
            --accent-strong: #fbbf24;
            --btn-primary: linear-gradient(135deg, #f59e0b, #b45309);
            --btn-shadow: rgba(0, 0, 0, 0.5);
            --mode-active-bg: linear-gradient(135deg, #f59e0b, #b45309);
            --mode-active-text: #111827;
            --placeholder-color: rgba(248, 250, 252, 0.44);
            --panel-border: rgba(255, 255, 255, 0.08);
            --ring: 0 0 0 1px rgba(255, 255, 255, 0.06), 0 30px 60px rgba(0, 0, 0, 0.45);
        }

        * { box-sizing: border-box; }

        html, body { min-height: 100%; }

        body {
            font-family: 'Inter', 'PingFang TC', sans-serif;
            background: var(--bg);
            background-attachment: fixed;
            color: var(--text);
            font-size: var(--base-font-size);
            transition: var(--transition);
            margin: 0;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            z-index: -2;
            border-radius: 999px;
            filter: blur(32px);
            opacity: 0.7;
            pointer-events: none;
        }

        body::before {
            width: 320px;
            height: 320px;
            top: -100px;
            right: -80px;
            background: color-mix(in srgb, var(--accent) 38%, transparent);
        }

        body::after {
            width: 260px;
            height: 260px;
            bottom: -80px;
            left: -80px;
            background: color-mix(in srgb, var(--accent-strong) 22%, transparent);
        }

        input[type="time"]::-webkit-calendar-picker-indicator { display: none !important; }
        input::placeholder, textarea::placeholder { color: var(--placeholder-color); }

        input, select, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 18px;
            color: var(--text);
            outline: none;
            transition: var(--transition);
        }

        input:focus, select:focus, textarea:focus {
            border-color: color-mix(in srgb, var(--accent) 45%, white);
            box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent);
        }

        .app-shell {
            width: 100%;
            max-width: 1180px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
        }

        .app-frame {
            width: min(100%, 960px);
            display: grid;
            gap: 24px;
        }

        .hero-panel,
        .content-panel,
        .settings-panel,
        .panel-block {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--panel-border);
            border-radius: 30px;
            box-shadow: var(--ring);
        }

        .hero-panel {
            overflow: hidden;
            padding: 24px;
        }

        .hero-panel::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(130deg, color-mix(in srgb, var(--accent) 20%, transparent), transparent 45%),
                linear-gradient(0deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0));
            pointer-events: none;
        }

        .hero-grid {
            position: relative;
            display: grid;
            gap: 20px;
            align-items: start;
        }

        .hero-copy {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .hero-badge {
            align-self: flex-start;
            padding: 8px 14px;
            border-radius: 999px;
            background: color-mix(in srgb, var(--accent) 15%, transparent);
            border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
            color: var(--text);
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .brand-title {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3.3rem);
            font-weight: 900;
            line-height: 0.98;
            letter-spacing: -0.05em;
        }

        .hero-note {
            margin: 0;
            max-width: 32rem;
            color: var(--text-muted);
            line-height: 1.7;
            font-size: 0.98rem;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 14px;
            align-items: center;
        }

        .toolbar-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .font-scaler-btn, .skin-dot, .gear-btn, .close-btn {
            width: 46px;
            height: 46px;
            border-radius: 16px;
            border: 1px solid var(--input-border);
            background: var(--surface-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 900;
            color: var(--text);
        }

        .font-scaler-btn:hover, .skin-dot:hover, .gear-btn:hover, .close-btn:hover {
            transform: translateY(-2px);
            border-color: color-mix(in srgb, var(--accent) 35%, white);
        }

        .skin-dot.active {
            background: var(--btn-primary);
            color: #fff;
            box-shadow: 0 14px 28px var(--btn-shadow);
            border-color: transparent;
        }

        .close-btn {
            background-color: var(--warning-red) !important;
            color: white !important;
            border-color: transparent !important;
            box-shadow: 0 18px 28px rgba(239, 68, 68, 0.3);
        }

        .content-panel,
        .settings-panel {
            padding: 24px;
        }

        .panel-stack {
            display: grid;
            gap: 18px;
        }

        .panel-block {
            padding: 20px;
            background: var(--surface-strong);
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 14px;
        }

        .section-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 900;
            letter-spacing: 0.02em;
            font-size: 0.96rem;
        }

        .section-tag::before {
            content: "";
            width: 12px;
            height: 12px;
            border-radius: 999px;
            background: var(--accent);
            box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 56%, transparent);
        }

        .info-grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .field-card {
            padding: 16px;
            border-radius: 22px;
            background: linear-gradient(180deg, color-mix(in srgb, var(--surface-soft) 100%, transparent), transparent);
            border: 1px solid var(--input-border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .field-card label,
        .field-card .label-text {
            display: block;
            font-size: 0.78rem;
            font-weight: 800;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .field-card .helper {
            color: var(--text-muted);
            font-size: 0.72rem;
            line-height: 1.5;
        }

        .input-wrapper { position: relative; width: 100%; }
        .input-icon-overlay {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            opacity: 0.7;
            display: flex;
            align-items: center;
        }

        .mode-grid {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .mode-btn {
            min-height: 108px;
            padding: 16px 12px;
            border-radius: 22px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            transition: var(--transition);
            font-weight: 800;
            color: var(--text);
        }

        .mode-btn.active {
            background: var(--mode-active-bg) !important;
            color: var(--mode-active-text) !important;
            border-color: transparent;
            box-shadow: 0 18px 30px var(--btn-shadow);
            transform: translateY(-3px);
        }

        #mode-morning.active svg, #mode-evening.active svg, #mode-special.active svg {
            color: currentColor !important;
        }

        .theme-dynamic-bg {
            border: 0;
            transition: var(--transition);
        }

        .btn-action {
            width: 100%;
            border: 0;
            border-radius: 20px;
            background: var(--btn-primary);
            box-shadow: 0 18px 32px var(--btn-shadow);
            transition: 0.2s;
            color: white;
            letter-spacing: 0.02em;
        }

        .btn-action:hover { transform: translateY(-2px); }
        .btn-action:active { transform: translateY(1px) scale(0.995); }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #b91c1c) !important;
            box-shadow: 0 18px 32px rgba(127, 29, 29, 0.3) !important;
        }

        .submit-wrap {
            position: sticky;
            bottom: 18px;
            z-index: 20;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            pointer-events: none;
        }

        #cropper-modal {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: none; flex-direction: column;
        }
        #cropper-container {
            flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        #cropper-image { max-width: 100%; max-height: 100%; user-select: none; }
        #crop-box { position: absolute; border: 2px solid var(--accent); box-shadow: 0 0 0 9999px rgba(0,0,0,0.6); cursor: move; display: none; }
        .crop-handle { position: absolute; width: 15px; height: 15px; background: #fff; border: 2px solid var(--accent); border-radius: 50%; }
        .handle-nw { top: -8px; left: -8px; cursor: nw-resize; }
        .handle-ne { top: -8px; right: -8px; cursor: ne-resize; }
        .handle-sw { bottom: -8px; left: -8px; cursor: sw-resize; }
        .handle-se { bottom: -8px; right: -8px; cursor: se-resize; }
        .cropper-actions { background: rgba(0,0,0,0.8); padding: 20px; display: flex; gap: 12px; justify-content: center; }

        /* =========================================
           專業對話框 (Modal Dialog)
           ========================================= */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 5000;
            background: rgba(15, 23, 42, 0.4);
            display: flex; align-items: center; justify-content: center;
            padding: 24px; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease-out;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-card {
            background: #ffffff; width: 100%; max-width: 400px; border-radius: 32px;
            padding: 32px; text-align: center; color: #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.active .modal-card { transform: scale(1); }

        .result-icon-circle {
            width: 80px; height: 80px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; margin: 0 auto 24px;
        }
        .icon-success { background: #ecfdf5; color: #10b981; }
        .icon-error { background: #fef2f2; color: #ef4444; }

        .modal-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; color: #0f172a; }
        .modal-desc { font-size: 1rem; color: #64748b; line-height: 1.6; margin-bottom: 24px; }
        .modal-btn {
            width: 100%; padding: 16px; border-radius: 16px; font-weight: 800;
            background: #0f172a; color: #fff; transition: transform 0.2s;
        }
        .modal-btn:active { transform: scale(0.95); }

        .hidden { display: none !important; }

        @media (min-width: 900px) {
            .hero-grid {
                grid-template-columns: minmax(0, 1.4fr) minmax(260px, 0.9fr);
            }
        }

        @media (max-width: 768px) {
            body { padding: 18px; }
            .hero-panel, .content-panel, .settings-panel { padding: 18px; }
            .panel-block { padding: 16px; }
            .info-grid, .mode-grid { grid-template-columns: 1fr; }
            .submit-wrap { bottom: 8px; }
        }
    </style>

                    <div class="panel-stack">

    <!-- iframe 內嵌預覽層 -->

                <span class="text-xs opacity-70 mt-1 max-w-[200px] text-center">如果一直沒有畫面顯示，請確認權限是否有公開或至設定更改預覽網址</span>

    <!-- 載入中 -->
    <div id="loading-overlay" class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm flex items-center justify-center z-[6000] hidden">
        <svg class="animate-spin text-white" width="48" height="48" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    </div>

    <script>
        const CONFIG = {
            GAS_URL: 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec',
            DEFAULT_REASONS: "交接輪值,百貨類處理,教科書處理,數位印刷,臨時急件",
            VERSION: 'V2.5.0 [跨夜與雙日期支援]',
            FONT_STEPS: [14, 18, 22],
            DEFAULT_OFF_TIMES: {
                morning: '17:00',
                evening: '03:00',
                special: '12:00'
            }
        };

        const isGasEnv = typeof google !== 'undefined' && google.script && google.script.run;

        let savedTimes = JSON.parse(localStorage.getItem('normal_off_times'));
        if (savedTimes && savedTimes.evening === '00:00' && savedTimes.special === '17:00') {
            savedTimes = null; // 強制更新為新預設值
        }

        let state = {
            activeTab: 'home',
            theme: localStorage.getItem('theme') || 'poryphone',
            fontSize: parseInt(localStorage.getItem('base_font_size')) || 18,
            mode: 'morning',
            apiUrl: localStorage.getItem('gas_url') || CONFIG.GAS_URL,
            sheetUrl: localStorage.getItem('sheet_url') || '',
            customReasons: localStorage.getItem('custom_reasons') || CONFIG.DEFAULT_REASONS,
            name: localStorage.getItem('user_name') || '',
            normalOffTimes: savedTimes || CONFIG.DEFAULT_OFF_TIMES
        };

        // 取得本地日期 (YYYY-MM-DD)
        function getLocalDateString(d = new Date()) {
            const offset = d.getTimezoneOffset();
            const local = new Date(d.getTime() - (offset * 60 * 1000));
            return local.toISOString().split('T')[0];
        }

        const apiService = {
            call: async (action, params) => {
                if (isGasEnv) {
                    return new Promise((resolve, reject) => {
                        const handler = {
                            success: (res) => resolve(res),
                            failure: (err) => reject(err)
                        };
                        if (action === 'ocr') {
                            google.script.run.withSuccessHandler(handler.success).withFailureHandler(handler.failure).processImage(params.image);
                        } else if (action === 'submit') {
                            google.script.run.withSuccessHandler(handler.success).withFailureHandler(handler.failure).handleFormSubmit(params);
                        } else if (action === 'reset_template') {
                            google.script.run.withSuccessHandler(handler.success).withFailureHandler(handler.failure).setupG16KTemplate();
                            resolve({ result: 'success' });
                        }
                    });
                } else {
                    if (state.apiUrl && !state.apiUrl.includes('YOUR_SCRIPT_ID')) {
                        const formData = new FormData();
                        formData.append('action', action);
                        for (let key in params) formData.append(key, params[key]);
                        try {
                            const res = await fetch(state.apiUrl, { method: 'POST', body: formData });
                            return await res.json();
                        } catch (e) { console.error("Fetch failed", e); }
                    }
                    await new Promise(r => setTimeout(r, 1000));
                    if (action === 'ocr') return { result: 'success', text: '裁切範圍辨識成功 (模擬內容)' };
                    return { result: 'success' };
                }
            }
        };

        function showResultModal(type, title, desc) {
            const modal = document.getElementById('resultModal');
            document.getElementById('modal-standard-content').classList.remove('hidden');
            document.getElementById('modal-custom-content').classList.add('hidden');
            const iconContainer = document.getElementById('result-icon-container');
            document.getElementById('result-title').innerText = title;
            document.getElementById('result-desc').innerText = desc;
            iconContainer.className = 'result-icon-circle ' + (type === 'success' ? 'icon-success' : 'icon-error');
            const successSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            const errorSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>`;
            iconContainer.innerHTML = (type === 'success' ? successSvg : errorSvg);
            const btn = document.getElementById('modal-standard-btn');
            if (btn) btn.style.display = desc.includes('⏳') ? 'none' : 'block';
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function showCustomModal(contentHtml) {
            const modal = document.getElementById('resultModal');
            document.getElementById('modal-standard-content').classList.add('hidden');
            const customArea = document.getElementById('modal-custom-content');
            customArea.innerHTML = contentHtml;
            customArea.classList.remove('hidden');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeResultModal() {
            document.getElementById('resultModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        window.openPreview = () => {
            if (!state.sheetUrl) { alert('請先至「設定」填寫 Google Sheet 預覽網址！'); return; }
            closeResultModal();
            const previewModal = document.getElementById('preview-modal');
            const previewIframe = document.getElementById('preview-iframe');
            previewIframe.src = state.sheetUrl;
            previewModal.classList.remove('hidden');
            previewModal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        };

        window.closePreview = () => {
            const previewModal = document.getElementById('preview-modal');
            const previewIframe = document.getElementById('preview-iframe');
            previewModal.classList.add('hidden');
            previewModal.classList.remove('flex');
            previewIframe.src = '';
            document.body.style.overflow = '';
        };

        window.closeToast = () => { closeResultModal(); };
        window.toast = (msg) => { showResultModal('success', '系統處理', msg); };

        window.confirmReset = () => {
            const url = localStorage.getItem('gas_url');
            if(!url) return alert('請先設定 API 網址');
            const content = `
                <div style="font-size: 4rem; color: #ef4444; margin-bottom: 10px;">⚠️</div>
                <div style="font-size: 1.5rem; color: #ef4444; margin-bottom: 5px; font-weight:800;">嚴重警告</div>
                <div style="font-size: 1rem; color: #666; line-height: 1.6; font-weight:600;">確定要重設範本嗎？<br>此動作將會覆蓋雲端定義且無法撤銷！</div>
                <div style="display: flex; gap: 15px; width: 100%; margin-top: 24px;">
                    <button style="flex:1; padding:15px; border-radius:12px; border:none; background:#eee; color:#333; font-weight:900; cursor:pointer;" onclick="closeToast()">取消返回</button>
                    <button style="flex:1; padding:15px; border-radius:12px; border:none; background:#ef4444; color:white; font-weight:900; cursor:pointer;" onclick="executeReset()">確認重設</button>
                </div>`;
            showCustomModal(content);
        };

        window.executeReset = () => {
            const url = localStorage.getItem('gas_url');
            closeToast();
            toast('⏳ 重設請求傳送中...');
            const fd = new FormData(); fd.append('action', 'reset_template');
            fetch(url, { method: 'POST', body: fd })
                .then(r => r.json()).then(d => {
                    if(d.result === 'success' || d.status === 'success') {
                        toast('✅ 範本重設成功');
                    } else {
                        alert('❌ 重設失敗: ' + (d.error || '未知錯誤'));
                        closeToast();
                    }
                }).catch(() => {
                    alert('❌ 連線異常');
                    closeToast();
                });
        };

        let cropperData = { img: null, box: { x: 50, y: 50, w: 200, h: 100 }, isDragging: false, isResizing: false, resizeDir: '', startX: 0, startY: 0 };
        function openCropper(base64) {
            const modal = document.getElementById('cropper-modal');
            const img = document.getElementById('cropper-image');
            img.src = base64;
            img.onload = () => {
                modal.style.display = 'flex';
                document.getElementById('crop-box').style.display = 'block';
                cropperData.box = { x: (img.clientWidth - 200) / 2, y: (img.clientHeight - 100) / 2, w: 200, h: 100 };
                updateCropBoxUI();
            };
        }
        function closeCropper() { document.getElementById('cropper-modal').style.display = 'none'; }
        function updateCropBoxUI() {
            const b = cropperData.box;
            const el = document.getElementById('crop-box');
            el.style.left = b.x + 'px'; el.style.top = b.y + 'px';
            el.style.width = b.w + 'px'; el.style.height = b.h + 'px';
        }

        const cropperContainer = document.getElementById('cropper-container');
        cropperContainer.onmousedown = cropperContainer.ontouchstart = (e) => {
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            if (e.target.classList.contains('crop-handle')) {
                cropperData.isResizing = true;
                cropperData.resizeDir = e.target.className.split('handle-')[1];
            } else if (e.target.id === 'crop-box') {
                cropperData.isDragging = true;
            } else return;
            cropperData.startX = clientX; cropperData.startY = clientY;
            e.preventDefault();
        };

        window.onmousemove = window.ontouchmove = (e) => {
            if (!cropperData.isDragging && !cropperData.isResizing) return;
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            const dx = clientX - cropperData.startX; const dy = clientY - cropperData.startY;
            if (cropperData.isDragging) { cropperData.box.x += dx; cropperData.box.y += dy; }
            else if (cropperData.isResizing) {
                if (cropperData.resizeDir.includes('e')) cropperData.box.w += dx;
                if (cropperData.resizeDir.includes('s')) cropperData.box.h += dy;
                if (cropperData.resizeDir.includes('w')) { cropperData.box.x += dx; cropperData.box.w -= dx; }
                if (cropperData.resizeDir.includes('n')) { cropperData.box.y += dy; cropperData.box.h -= dy; }
            }
            cropperData.startX = clientX; cropperData.startY = clientY; updateCropBoxUI();
        };
        window.onmouseup = window.ontouchend = () => { cropperData.isDragging = false; cropperData.isResizing = false; };

        async function confirmCropAndOCR() {
            setLoading(true);
            const img = document.getElementById('cropper-image');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const scaleX = img.naturalWidth / img.clientWidth;
            const scaleY = img.naturalHeight / img.clientHeight;
            const finalW = cropperData.box.w * scaleX;
            const finalH = cropperData.box.h * scaleY;
            canvas.width = finalW; canvas.height = finalH;
            ctx.drawImage(img, cropperData.box.x*scaleX, cropperData.box.y*scaleY, finalW, finalH, 0, 0, finalW, finalH);
            const croppedBase64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
            closeCropper();
            try {
                const data = await apiService.call('ocr', { image: croppedBase64 });
                if (data.result === 'success' && data.text) {
                    document.getElementById('input-reason').value = data.text;
                }
            } catch (e) { console.error(e); } finally { setLoading(false); }
        }

        window.onload = () => {
            initBackground(); applyTheme(state.theme); applyFontSize(state.fontSize); 
            document.getElementById('cfg-name').value = state.name;
            document.getElementById('cfg-url').value = state.apiUrl;
            document.getElementById('cfg-sheet-url').value = state.sheetUrl;
            document.getElementById('cfg-reasons').value = state.customReasons;
            
            document.getElementById('cfg-time-morning').value = state.normalOffTimes.morning;
            document.getElementById('cfg-time-evening').value = state.normalOffTimes.evening;
            document.getElementById('cfg-time-special').value = state.normalOffTimes.special;

            document.getElementById('version-label').innerText = '版本 ' + CONFIG.VERSION + (isGasEnv ? ' [GAS]' : ' [WEB]');
            
            // 自動辨識時段並更新時間與日期
            const autoMode = autoDetectMode();
            setMode(autoMode);
            
            refreshQuickReasons();
        };

        function autoDetectMode() {
            const now = new Date();
            const currentMinutes = now.getHours() * 60 + now.getMinutes();

            const parseTime = (t) => {
                if (!t) return 0;
                const [h, m] = t.split(':').map(Number);
                return h * 60 + m;
            };

            const modes = ['morning', 'evening', 'special'];
            let bestMode = 'morning';
            let minDiff = Infinity;

            modes.forEach(m => {
                const offTime = parseTime(state.normalOffTimes[m]);
                // 計算與正常下班時間的差距 (分鐘)，處理跨夜情況
                let diff = currentMinutes - offTime;
                if (diff < 0) diff += 24 * 60;
                
                if (diff < minDiff) {
                    minDiff = diff;
                    bestMode = m;
                }
            });

            return bestMode;
        }

        function showTab(tab) {
            state.activeTab = tab;
            const home = document.getElementById('tab-home'); const settings = document.getElementById('tab-settings');
            const toSet = document.getElementById('btn-to-settings'); const toHome = document.getElementById('btn-to-home');
            const title = document.getElementById('page-title');
            if (tab === 'home') {
                home.classList.remove('hidden'); settings.classList.add('hidden');
                toSet.classList.remove('hidden'); toHome.classList.add('hidden');
                title.innerText = '無盡火域：神魄登記';
            } else {
                home.classList.add('hidden'); settings.classList.remove('hidden');
                toSet.classList.add('hidden'); toHome.classList.remove('hidden');
                title.innerText = '核心系統設置';
            }
        }

        function setTheme(t) { state.theme = t; localStorage.setItem('theme', t); applyTheme(t); }
        function applyTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
            document.querySelectorAll('.skin-dot').forEach(btn => btn.classList.remove('active'));
            if (t === 'poryphone') document.getElementById('theme-p').classList.add('active');
            if (t === 'light') document.getElementById('theme-l').classList.add('active');
            if (t === 'dark') document.getElementById('theme-d').classList.add('active');
            const dynamicBgColor = t==='poryphone' ? '#00f2ff' : (t==='light' ? '#6366f1' : '#f59e0b');
            document.querySelectorAll('.theme-dynamic-bg').forEach(el => { el.style.background = dynamicBgColor; });
        }

        function toggleFontSize() {
            const idx = CONFIG.FONT_STEPS.indexOf(state.fontSize);
            state.fontSize = CONFIG.FONT_STEPS[(idx + 1) % CONFIG.FONT_STEPS.length];
            localStorage.setItem('base_font_size', state.fontSize); applyFontSize(state.fontSize);
        }
        function applyFontSize(size) { document.documentElement.style.setProperty('--base-font-size', size + 'px'); }

        function setMode(m) {
            state.mode = m; document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('mode-' + m).classList.add('active'); 
            updateTimeByMode(m);
        }
        function updateTimeByMode(m) {
            const now = new Date();
            const startTimeStr = state.normalOffTimes[m] || ""; 
            const endTimeStr = now.toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' });
            
            document.getElementById('input-startTime').value = startTimeStr;
            document.getElementById('input-endTime').value = endTimeStr;
            
            // 切換模式時，將結束日期重置為今天
            document.getElementById('input-endDate').value = getLocalDateString(now);
            
            recalculateDates();
        }

        function recalculateDates() {
            const startTimeStr = document.getElementById('input-startTime').value;
            const endTimeStr = document.getElementById('input-endTime').value;
            
            let endDateStr = document.getElementById('input-endDate').value;
            let endDate = new Date();
            if (endDateStr) {
                const [y, m, d] = endDateStr.split('-');
                endDate = new Date(y, m - 1, d);
            }
            let startDate = new Date(endDate);
            
            if (state.mode === 'evening') {
                // 晚班模式：因為都是跨日，所以開始日期是結束日期前一天
                startDate.setDate(startDate.getDate() - 1);
            } else if (state.mode === 'morning' || state.mode === 'special') {
                // 早班、特殊時段：開始日期等於結束日期
            } else {
                // 預設跨夜邏輯：如果結束時間小於開始時間，代表跨過了午夜
                if (startTimeStr && endTimeStr && endTimeStr < startTimeStr) {
                    startDate.setDate(startDate.getDate() - 1);
                }
            }
            
            document.getElementById('input-startDate').value = getLocalDateString(startDate);
            document.getElementById('input-endDate').value = getLocalDateString(endDate);
        }

        // 綁定時間變更事件，讓使用者手動修改時間時也能自動計算跨夜
        document.getElementById('input-startTime').addEventListener('change', recalculateDates);
        document.getElementById('input-endTime').addEventListener('change', recalculateDates);
        document.getElementById('input-endDate').addEventListener('change', recalculateDates);

        function refreshQuickReasons() {
            const select = document.getElementById('quick-reason');
            select.innerHTML = '<option value="" disabled selected>-- 快速事由選擇 --</option>';
            state.customReasons.split(/[,，\n]+/).map(s => s.trim()).filter(s => s).forEach(r => {
                const opt = document.createElement('option'); opt.value = r; opt.innerText = r; select.appendChild(opt);
            });
        }
        function applyQuickReason() {
            const val = document.getElementById('quick-reason').value;
            if (val) document.getElementById('input-reason').value = val;
        }

        function saveSettings() {
            state.name = document.getElementById('cfg-name').value.trim();
            state.apiUrl = document.getElementById('cfg-url').value.trim();
            state.sheetUrl = document.getElementById('cfg-sheet-url').value.trim();
            state.customReasons = document.getElementById('cfg-reasons').value.trim();
            
            state.normalOffTimes = {
                morning: document.getElementById('cfg-time-morning').value,
                evening: document.getElementById('cfg-time-evening').value,
                special: document.getElementById('cfg-time-special').value
            };

            localStorage.setItem('user_name', state.name); 
            localStorage.setItem('gas_url', state.apiUrl); 
            localStorage.setItem('sheet_url', state.sheetUrl);
            localStorage.setItem('custom_reasons', state.customReasons);
            localStorage.setItem('normal_off_times', JSON.stringify(state.normalOffTimes));

            refreshQuickReasons();
            showResultModal('success', '設定已儲存', '您的個人偏好與連結配置已成功更新。');
            showTab('home');
        }

        async function handleOCR(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader(); reader.onload = () => openCropper(reader.result); reader.readAsDataURL(file);
        }

        async function submitData() {
            const reason = document.getElementById('input-reason').value;
            if (!reason || !state.name) {
                return showResultModal('error', '資料不完整', '請填寫登記姓名與事由內容再行發送。');
            }
            setLoading(true);
            const params = { 
                name: state.name, 
                date: document.getElementById('input-startDate').value, // 保留向下相容
                startDate: document.getElementById('input-startDate').value,
                endDate: document.getElementById('input-endDate').value,
                startTime: document.getElementById('input-startTime').value, 
                endTime: document.getElementById('input-endTime').value, 
                reason: reason 
            };
            try {
                const data = await apiService.call('submit', params);
                if (data.result === 'success') {
                    document.getElementById('input-reason').value = '';
                    const successSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
                    const contentHtml = `
                        <div class="result-icon-circle icon-success">${successSvg}</div>
                        <h3 class="modal-title" style="margin-bottom:12px;">登記成功！</h3>
                        <div style="text-align:left; font-size:0.95rem; color:#64748b; line-height:1.6; background:#f1f5f9; padding:16px; border-radius:16px; margin-bottom:24px;">
                            ✅ 您的資料已同步至雲端試算表。
                        </div>
                        <div style="display: flex; gap: 12px; width: 100%;">
                            <button style="flex:1; padding:16px; border-radius:16px; border:none; background:#94a3b8; color:white; font-weight:900; cursor:pointer;" onclick="closeResultModal()">確定</button>
                            <button style="flex:1; padding:16px; border-radius:16px; border:none; background:var(--accent); color:white; font-weight:900; cursor:pointer;" onclick="openPreview()">預覽結果</button>
                        </div>
                    `;
                    showCustomModal(contentHtml);
                } else {
                    showResultModal('error', '登記失敗', data.error || '伺服器拒絕了您的請求。');
                }
            } catch (e) { showResultModal('error', '發送失敗', '請檢查連線或 GAS URL。'); } finally { setLoading(false); }
        }

        function setLoading(val) { document.getElementById('loading-overlay').classList.toggle('hidden', !val); }

        function initBackground() {
            const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d');
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            window.onresize = resize;
            resize();
        }
    </script>
<script type="module" src="/index.tsx"></script>
</body>
